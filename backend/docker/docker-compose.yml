# ================================
# Backend (NestJS Monolith) - Production
# ================================
# ไม่ใส่ container_name — จะได้ไม่ไปแทนที่ container อื่นที่รันอยู่ (เช่น smart-cabinet-backend)
# ถ้ามี container เดิมอยู่แล้ว (เช่น smart-cabinet-backend บน port 4000) อยากรันอีก instance:
#   ใช้ -p ตั้ง project name ใหม่ → instance ใหม่จะได้ port 3000 (ค่าเริ่มต้น)
#   ตัวอย่าง: docker compose -p smart-cabinet-vn -f docker/docker-compose.yml --env-file .env up -d --build

services:
  backend:
    env_file:
      - ../.env
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    image: backend-smart-cabinet:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_USER=${DATABASE_USER:-}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-}
      - DATABASE_NAME=${DATABASE_NAME:-}
      - DATABASE_HOST=${DATABASE_HOST:-}
      - DATABASE_PORT=${DATABASE_PORT:-}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-${JWT_SECRET}}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/smart-cabinet-vn/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s