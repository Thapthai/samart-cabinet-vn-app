# ================================
# Frontend (Next.js) - Production
# ================================
# รันแยกแต่ละแอปด้วย -p (project name) เพื่อไม่ให้แอปหนึ่งไปแทนอีกแอป:
#   แอป VN: docker compose -p smart-cabinet-vn -f docker/docker-compose.yml --env-file .env up -d --build
#   แอป CU: docker compose -p smart-cabinet-cu -f docker/docker-compose.yml --env-file .env up -d --build
# แต่ละแอปต้องใช้พอร์ตคนละค่าใน .env (FRONTEND_HOST_PORT=3100 กับ 3101 ฯลฯ)
# ไม่ใส่ container_name เพื่อให้ Compose ตั้งชื่อจาก project (-p) เช่น smart-cabinet-vn-frontend-1

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/smart-cabinet-vn/v1}
        - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-/medical-supplies}
    image: frontend-smart-cabinet:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-3100}:3100"
    environment:
      - NODE_ENV=production
      - PORT=3100
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/smart-cabinet-vn/v1}
      - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-/medical-supplies}
      - BACKEND_API_URL=${BACKEND_API_URL:-http://host.docker.internal:3000/api/smart-cabinet-vn/v1}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3100/medical-supplies}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/medical-supplies', (r)=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
