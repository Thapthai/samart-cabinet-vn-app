# ================================
# Frontend (Next.js) - Production — Smart Cabinet CU
# ================================
# ใช้จากโฟลเดอร์ frontend: docker compose -f docker/docker-compose.yml --env-file .env up -d --build
# ถ้า deploy คนละเครื่องกับ sv map (ออกนอก): ใส่ใน .env ตาม frontend/.env.server.example
#   NEXTAUTH_URL + NEXT_PUBLIC_API_URL + BACKEND_API_URL = URL ภายนอก (โดเมนที่ชี้ไป sv map)

services:
  frontend-vn:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/smart-cabinet-vn/v1}
        - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-/medical-supplies}
    image: frontend-smart-cabinet-vn:latest
    container_name: smart-cabinet-frontend-vn
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - NODE_ENV=production
      - PORT=3100
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/smart-cabinet-vn/v1}
      - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-/medical-supplies}
      - BACKEND_API_URL=${BACKEND_API_URL:-http://host.docker.internal:3000/api/smart-cabinet-vn/v1}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3100/medical-supplies}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/medical-supplies"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: smart-cabinet-vn-frontend-network
