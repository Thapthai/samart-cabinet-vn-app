# smart-cabinet-cu
# ใส่ใน VirtualHost ที่ใช้ (หรือ Include ใน httpd-vhosts.conf ของ Apache)
# ลำดับสำคัญ: /api/smart-cabinet-cu/v1/ ต้องอยู่ก่อน /smart-cabinet-cu/ เพื่อไม่ให้ API ชน frontend

<Location "/api/smart-cabinet-cu/v1/">
    ProxyPreserveHost On
    ProxyPass "http://10.11.9.84:4000/api/smart-cabinet-cu/v1/"
    ProxyPassReverse "http://10.11.9.84:4000/api/smart-cabinet-cu/v1/"
</Location>

<Location "/smart-cabinet-cu/">
    ProxyPreserveHost On
    ProxyPass "http://10.11.9.84:4100/smart-cabinet-cu/"
    ProxyPassReverse "http://10.11.9.84:4100/smart-cabinet-cu/"
</Location>
